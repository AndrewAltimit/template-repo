name: 'PR Review Fix'
description: 'Apply fixes based on AI review feedback from Claude, OpenRouter, Gemini, and Codex reviews'

inputs:
  pr_number:
    description: 'PR number'
    required: true
  branch_name:
    description: 'Branch name to push fixes to'
    required: true
  max_iterations:
    description: 'Maximum fix iterations'
    required: false
    default: '5'
  github_token:
    description: 'GitHub token for iteration check (read-only)'
    required: true

outputs:
  made_changes:
    description: 'Whether a commit was created by the agent'
    value: ${{ steps.agent-fix.outputs.made_changes || steps.skip.outputs.made_changes || 'false' }}
  pushed:
    description: 'Whether the commit was verifiably pushed to the remote'
    value: ${{ steps.agent-fix.outputs.pushed || 'false' }}
  commit_sha:
    description: 'SHA of the commit created (empty if no changes)'
    value: ${{ steps.agent-fix.outputs.commit_sha || '' }}
  iteration_count:
    description: 'Current iteration count'
    value: ${{ steps.iteration.outputs.iteration_count }}
  exceeded_max:
    description: 'Whether max iterations were exceeded'
    value: ${{ steps.iteration.outputs.exceeded_max }}

runs:
  using: 'composite'
  steps:
    - name: Ensure clean working directory
      shell: bash
      run: |
        git checkout -- . 2>/dev/null || true
        git clean -fd 2>/dev/null || true
        echo "Working directory reset to clean state"

    - name: Check iteration count
      id: iteration
      uses: ./.github/actions/agent-iteration-check
      with:
        pr_number: ${{ inputs.pr_number }}
        max_iterations: ${{ inputs.max_iterations }}
        agent_type: 'review-fix'
        github_token: ${{ inputs.github_token }}

    - name: Skip if max iterations reached
      id: skip
      if: steps.iteration.outputs.exceeded_max == 'true'
      shell: bash
      run: |
        echo "Maximum iterations (${{ inputs.max_iterations }}) reached for review-fix agent. Manual intervention required."
        echo "made_changes=false" >> $GITHUB_OUTPUT
        exit 0

    - name: Download review artifacts
      if: steps.iteration.outputs.should_skip != 'true'
      uses: actions/download-artifact@v6
      continue-on-error: true
      with:
        pattern: '*-review-${{ github.run_id }}-${{ github.run_attempt }}'
        merge-multiple: true
        path: .

    - name: Validate review artifacts
      if: steps.iteration.outputs.should_skip != 'true'
      shell: bash
      run: |
        found=0
        for f in claude-security-review.md claude-quality-review.md openrouter-review.md gemini-review.md codex-review.md; do
          if [ -s "$f" ]; then
            echo "Found review artifact: $f ($(wc -c < "$f") bytes)"
            found=1
          fi
        done
        if [ "$found" -eq 0 ]; then
          echo "::warning::No review artifacts found -- agent will have no feedback to process"
        fi

    - name: Setup Node.js
      if: steps.iteration.outputs.should_skip != 'true'
      uses: ./.github/actions/setup-nodejs

    - name: Set Docker user environment
      if: steps.iteration.outputs.should_skip != 'true'
      shell: bash
      run: source ./automation/setup/docker/set-docker-user.sh

    - name: Run agent review response
      id: agent-fix
      if: steps.iteration.outputs.should_skip != 'true'
      shell: bash
      env:
        CLAUDE_SECURITY_REVIEW_PATH: claude-security-review.md
        CLAUDE_QUALITY_REVIEW_PATH: claude-quality-review.md
        OPENROUTER_REVIEW_PATH: openrouter-review.md
        GEMINI_REVIEW_PATH: gemini-review.md
        CODEX_REVIEW_PATH: codex-review.md
        PR_NUMBER: ${{ inputs.pr_number }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        ITERATION_COUNT: ${{ steps.iteration.outputs.iteration_count }}
      run: |
        echo "Running agent review response..."
        ./automation/ci-cd/agent-review-response.sh \
          "$PR_NUMBER" \
          "$BRANCH_NAME" \
          "$ITERATION_COUNT" \
          "${{ inputs.max_iterations }}"

    # If the agent committed locally but push verification failed, the commit
    # is saved as a .patch file in $RUNNER_TEMP/review-agent-patches/. Upload
    # it as an artifact so the work can be recovered manually rather than lost.
    - name: Upload unpushed commit patch (on push failure)
      if: always() && steps.agent-fix.outputs.made_changes == 'true' && steps.agent-fix.outputs.pushed == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: unpushed-review-commit-${{ inputs.pr_number }}-${{ github.run_id }}
        path: ${{ runner.temp }}/review-agent-patches/*.patch
        if-no-files-found: warn
        retention-days: 14

    # Always upload Claude's raw stream-json output. This gives us structured
    # tool_use events for post-mortem when the agent hallucinates (claims fixes
    # without actually editing files), and is cheap when nothing went wrong.
    - name: Upload Claude stream logs
      if: always() && steps.iteration.outputs.should_skip != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: review-agent-claude-logs-${{ inputs.pr_number }}-${{ github.run_id }}
        path: ${{ runner.temp }}/review-agent-logs/*.jsonl
        if-no-files-found: ignore
        retention-days: 14

    - name: Report push status to job summary
      if: always() && steps.iteration.outputs.should_skip != 'true'
      shell: bash
      env:
        MADE_CHANGES: ${{ steps.agent-fix.outputs.made_changes }}
        PUSHED: ${{ steps.agent-fix.outputs.pushed }}
        COMMIT_SHA: ${{ steps.agent-fix.outputs.commit_sha }}
      run: |
        {
          echo "## Review Response Agent"
          if [ "$MADE_CHANGES" = "true" ] && [ "$PUSHED" = "true" ]; then
            echo "- **Status:** changes pushed"
            echo "- **Commit:** \`$COMMIT_SHA\`"
          elif [ "$MADE_CHANGES" = "true" ] && [ "$PUSHED" != "true" ]; then
            echo "- **Status:** PUSH FAILED (commit created but not on remote)"
            echo "- **Commit:** \`$COMMIT_SHA\`"
            echo "- Patch artifact uploaded for recovery"
          else
            echo "- **Status:** no changes — no commit created"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Cleanup output directories
      if: always()
      shell: bash
      run: |
        if [ -f "./automation/ci-cd/cleanup-outputs.sh" ]; then
          ./automation/ci-cd/cleanup-outputs.sh
        fi

# cargo-deny configuration for tamper_briefcase
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "workspace"
ignore = [
    # pqcrypto-mlkem / pqcrypto-mldsa / pqcrypto-traits are unmaintained because
    # the upstream PQClean project is being archived (RUSTSEC-2026-0161/0166/0162).
    # These provide the NIST PQC primitives (ML-KEM, ML-DSA) the briefcase recovery
    # flow depends on; there is no maintained drop-in replacement yet, so we accept
    # the unmaintained status until the ecosystem settles on a successor crate.
    # TODO: migrate to a maintained ML-KEM/ML-DSA implementation when one stabilizes.
    "RUSTSEC-2026-0161",
    "RUSTSEC-2026-0162",
    "RUSTSEC-2026-0166",
]

[licenses]
# Allow common permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate from a registry is specified
wildcards = "allow"
# Allow specific crates (none banned for now)
deny = []

[sources]
# Lint level for what to happen when a crate from a registry is used
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git source is used
unknown-git = "warn"
# Allow crates from these registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
